services:
  mysql:
    image: mysql:8.4
    container_name: bookingmanager-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookingmanager
      MYSQL_USER: bookingmanager
      MYSQL_PASSWORD: bookingmanager
    ports:
      # Use 3307 on host if something else already binds 3306 locally
      - '3307:3306'
    volumes:
      - bookingmanager_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bookingmanager_mysql_data:
